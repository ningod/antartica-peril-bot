# fly.toml app configuration file generated for antartica-peril-bot on 2026-02-26T15:45:21Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'antartica-peril-bot'
primary_region = 'ams'

[build]

[deploy]
  release_command = 'npm run deploy-commands'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = '10s'
    interval = '30s'
    method = 'GET'
    timeout = '5s'
    path = '/health'

[env]
  INTERACTIONS_MODE = 'http'
  STORAGE_BACKEND = 'redis'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
