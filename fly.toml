# fly.toml — Antartica Peril Bot deployment configuration
app = "antartica-peril-bot"
primary_region = "ams"

[build]

[deploy]
  release_command = "npm run deploy-commands"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[env]
  INTERACTIONS_MODE = "http"
  STORAGE_BACKEND = "redis"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
